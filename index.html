<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AnTI Shop</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER -->
    <header id="mainHeader">
        <button id="clickerOpenBtn" class="header-btn clicker-btn">
            <img src="img/click-icon.png" alt="Кликер">
        </button>
        
        <h1 class="logo">AnTI Shop</h1>
        
        <div id="headerBalance" class="balance">
            <span id="headerBalanceValue">0</span>
            <img src="img/anti-coin.png" alt="Анти-коин">
        </div>
    </header>

    <!-- SHOP PAGE -->
    <main id="shopPage">
        <div class="container">
            <h2 class="shop-title">Каталог товаров</h2>
            <div id="itemsContainer" class="items-grid"></div>
            
            <div id="emptyState" class="empty-state">
                <p>Пока-что пусто</p>
            </div>
        </div>
    </main>

    <!-- CLICKER OVERLAY -->
    <div id="clickerOverlay" class="clicker-overlay hidden">
        <div class="clicker-content">
            <button id="closeClickerBtn" class="close-clicker-btn">← Назад в магазин</button>
            
            <div id="clickerBalance" class="balance clicker-balance">
                <span id="clickerBalanceValue">0</span>
                <img src="img/anti-coin.png" alt="">
            </div>

            <div id="clickArea">
                <div id="ground"><img src="img/ground.png" alt=""></div>
                <button id="clickButton">
                    <img id="clickImg" src="img/click1.png" alt="Кликер">
                </button>
            </div>
        </div>
    </div>

    <!-- LOGIN MODAL -->
    <div id="loginModal" class="modal hidden">
        <div class="modal-content">
            <h3>Для заработка Анти-коинов необходимо войти в аккаунт</h3>
            <button id="googleLoginBtn" class="google-btn">
                <img src="img/google-logo.png" alt="Google">
                Войти через Google
            </button>
            <button id="closeModalBtn" class="cancel-btn">Отмена</button>
        </div>
    </div>

<!-- Основной скрипт -->
    <script src="js/main.js"></script>
</body>
</html>
