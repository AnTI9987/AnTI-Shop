<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AnTI SHOP</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;700;900&family=Mulish:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════ -->
  <!--  HEADER                                    -->
  <!-- ═══════════════════════════════════════════ -->
  <header id="siteHeader">
    <div class="header-inner">

      <!-- левая зона: кнопка кликера -->
      <button id="clickerToggleBtn" class="clicker-entry-btn" title="Заработать AnTI-коины">
        <span class="coin-icon">₳</span>
        <span class="btn-label">ЗАРАБОТАТЬ</span>
      </button>

      <!-- логотип по центру -->
      <div class="site-logo">AnTI<span>SHOP</span></div>

      <!-- правая зона: баланс / auth -->
      <div class="header-right">
        <div id="balanceDisplay" class="balance-chip hidden">
          <span id="headerCoins">0</span>
          <span class="balance-unit">₳</span>
        </div>
        <button id="authBtn" class="auth-btn">ВОЙТИ</button>
      </div>

    </div>

    <!-- тонкая линия-акцент под хедером -->
    <div class="header-line"></div>
  </header>


  <!-- ═══════════════════════════════════════════ -->
  <!--  MAIN SHOP PAGE                            -->
  <!-- ═══════════════════════════════════════════ -->
  <main id="shopPage">

    <div class="shop-hero">
      <p class="hero-sub">КОЛЛЕКЦИЯ / СЕЗОН I</p>
      <h1 class="hero-title">ИЗБРАННЫЕ<br>ПРЕДМЕТЫ</h1>
    </div>

    <div class="shop-divider">
      <span>— КАТАЛОГ —</span>
    </div>

    <div id="productGrid" class="product-grid">
      <!-- товары будут вставлены из JS -->
      <div class="empty-catalog">
        <p>Пока-что пусто</p>
      </div>
    </div>

  </main>


  <!-- ═══════════════════════════════════════════ -->
  <!--  AUTH MODAL                                -->
  <!-- ═══════════════════════════════════════════ -->
  <div id="authModal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-icon">₳</div>
      <p class="modal-text">Для заработка AnTI-коинов<br>необходимо войти в аккаунт.</p>
      <button id="googleSignInBtn" class="google-btn">
        <svg width="20" height="20" viewBox="0 0 48 48" fill="none">
          <path d="M47.5 24.5c0-1.6-.1-3.2-.4-4.7H24v9h13.1c-.6 3-2.3 5.5-4.8 7.2v6h7.8c4.5-4.2 7.4-10.4 7.4-17.5z" fill="#4285F4"/>
          <path d="M24 48c6.5 0 12-2.1 16-5.8l-7.8-6c-2.2 1.5-5 2.3-8.2 2.3-6.3 0-11.6-4.2-13.5-10H2.5v6.2C6.5 42.8 14.7 48 24 48z" fill="#34A853"/>
          <path d="M10.5 28.5c-.5-1.5-.8-3-.8-4.5s.3-3 .8-4.5V13.3H2.5C.9 16.5 0 20.1 0 24s.9 7.5 2.5 10.7l8-6.2z" fill="#FBBC05"/>
          <path d="M24 9.5c3.5 0 6.6 1.2 9.1 3.5l6.8-6.8C35.9 2.4 30.4 0 24 0 14.7 0 6.5 5.2 2.5 13.3l8 6.2C12.4 13.7 17.7 9.5 24 9.5z" fill="#EA4335"/>
        </svg>
        Войти через Google
      </button>
      <button id="modalCloseBtn" class="modal-close">✕</button>
    </div>
  </div>


  <!-- ═══════════════════════════════════════════ -->
  <!--  CLICKER DRAWER (съезжает сверху)          -->
  <!-- ═══════════════════════════════════════════ -->
  <div id="clickerDrawer" class="clicker-drawer">
    <div class="clicker-bg"></div>

    <div class="clicker-content">

      <!-- кнопка назад -->
      <button id="clickerBackBtn" class="clicker-back-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M19 12H5M12 5l-7 7 7 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>НАЗАД</span>
      </button>

      <!-- счётчик монет -->
      <div class="clicker-balance">
        <span id="clickerCoins">0</span>
        <span class="clicker-unit">₳</span>
      </div>

      <!-- земля + персонаж -->
      <div class="clicker-stage">
        <div class="ground-wrap">
          <img src="img/ground.png" alt="" class="ground-img" onerror="this.style.display='none'">
        </div>
        <div id="clickCharacter" class="click-character">
          <button id="mainClickBtn" class="main-click-btn">
            <img id="clickImg" src="img/click1.png" alt="Кликать" onerror="this.outerHTML='<div class=\'click-fallback\'>👾</div>'">
          </button>
        </div>
      </div>

      <!-- подпись -->
      <p class="clicker-hint">НАЖИМАЙ — ЗАРАБАТЫВАЙ</p>

    </div>
  </div>


  <!-- ═══════════════════════════════════════════ -->
  <!--  АУДИО                                     -->
  <!-- ═══════════════════════════════════════════ -->
  <audio id="sClick" src="audio/click-clicker.mp3" preload="auto"></audio>
  <audio id="sBtn"   src="audio/click-button.mp3"  preload="auto"></audio>

  <script type="module" src="js/main.js"></script>
</body>
</html>
