<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AnTI Shop</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header id="mainHeader">
    <button id="clickerOpenBtn" class="header-btn">
      <!-- Иконка кликера (можно сделать SVG или img) -->
      <img src="img/click-icon.png" alt="Кликер">
    </button>
    
    <h1 class="logo">AnTI Shop</h1>
    
    <div id="headerBalance">
      <span id="headerBalanceValue">0</span>
      <img src="img/anti-coin.png" alt="Анти-коин">
    </div>
  </header>

  <!-- MAIN SHOP PAGE -->
  <main id="shopPage">
    <h2 class="shop-title">Наш ассортимент</h2>
    <div id="itemsContainer" class="items-grid"></div>
    
    <!-- Пока-что пусто -->
    <div id="emptyState" class="empty-state">
      <p>Пока-что пусто</p>
    </div>
  </main>

  <!-- CLICKER OVERLAY -->
  <div id="clickerOverlay" class="clicker-overlay">
    <div id="clickerContainer">
      <button id="closeClickerBtn" class="close-btn">← Назад</button>
      
      <div id="clickerBalance">
        <span id="clickerBalanceValue">0</span>
        <img src="img/anti-coin.png" alt="">
      </div>

      <div id="clickArea">
        <div id="ground"><img src="img/ground.png" alt=""></div>
        <button id="clickButton">
          <img id="clickImg" src="img/click1.png" alt="">
        </button>
      </div>
    </div>
  </div>

  <!-- LOGIN MODAL -->
  <div id="loginModal" class="modal">
    <div class="modal-content">
      <h3>Для заработка Анти-коинов необходимо войти</h3>
      <button id="googleLoginBtn" class="google-btn">
        <img src="img/google-logo.png" alt="Google">
        Войти через Google
      </button>
      <button id="closeModalBtn" class="cancel-btn">Отмена</button>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
